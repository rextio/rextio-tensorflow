name: Experimental Linux AArch64

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  RUSTUP_TOOLCHAIN: "1.93.1"

jobs:
  native-e2e-linux-aarch64:
    name: native-e2e / linux-aarch64 / experimental
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up CPython 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ci/requirements-native.txt
      - name: Verify AArch64 runner
        run: |
          python - <<'PY'
          import platform

          assert platform.system() == "Linux"
          assert platform.machine().lower() in {"aarch64", "arm64"}
          PY
      - name: Install exact toolchains and dependencies
        run: |
          rustup toolchain install 1.93.1 --profile minimal
          python -m pip install --upgrade pip==26.1
          python -m pip install -r ci/requirements-native.txt
          python -m build --wheel
          python -m pip install --no-deps dist/*.whl
          python -m pip check
      - name: Run availability-gated real-Cargo E2E
        env:
          REXTIO_TF_REQUIRE_INSTALLED_WHEEL: "1"
        run: python -m pytest -o pythonpath= tests/e2e/test_alpha_real_cargo.py -q
