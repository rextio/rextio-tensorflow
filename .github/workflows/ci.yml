name: CI

on:
  push:
    branches:
      - main
      - alpha/experimental-linux
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  quality:
    name: quality / CPython 3.11
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up CPython 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ci/requirements-quality.txt
      - name: Install pinned quality dependencies
        run: |
          python -m pip install --upgrade pip==26.1
          python -m pip install -r ci/requirements-quality.txt
          python -m pip install --no-deps -e .
      - name: Run unit and contract tests
        run: python -m pytest tests -m "not needs_cargo" -q
      - name: Run Ruff
        run: python -m ruff check src tests
      - name: Run mypy
        run: python -m mypy src

  platform-contract:
    name: platform-contract / ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        profile:
          - linux-x86_64
          - linux-aarch64
          - linux-i686
          - linux-armv7
          - macos-arm64
          - macos-x86_64
          - macos-i686
          - macos-armv7
    env:
      REXTIO_PLATFORM_PROFILE: ${{ matrix.profile }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up CPython 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ci/requirements-quality.txt
      - name: Install pinned contract dependencies
        run: |
          python -m pip install --upgrade pip==26.1
          python -m pip install rextio==0.1.3 pytest==9.1.1
          python -m pip install --no-deps -e .
      - name: Verify selected platform truth cell
        run: python -m pytest tests/test_platform_matrix.py -q

  native-e2e:
    name: native-e2e / ${{ matrix.profile }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: linux-x86_64
            runner: ubuntu-24.04
            expected_machine: x86_64
          - profile: macos-arm64
            runner: macos-15
            expected_machine: arm64
    env:
      EXPECTED_MACHINE: ${{ matrix.expected_machine }}
      RUSTUP_TOOLCHAIN: "1.93.1"
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up CPython 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ci/requirements-native.txt
      - name: Verify hosted architecture
        run: |
          python - <<'PY'
          import os
          import platform

          actual = platform.machine().lower()
          expected = os.environ["EXPECTED_MACHINE"]
          aliases = {"arm64": {"arm64", "aarch64"}, "x86_64": {"x86_64", "amd64"}}
          assert actual in aliases[expected], f"runner architecture {actual!r} != {expected!r}"
          PY
      - name: Install exact Rust toolchain
        run: rustup toolchain install 1.93.1 --profile minimal
      - name: Install exact backend and test dependencies
        run: |
          python -m pip install --upgrade pip==26.1
          python -m pip install -r ci/requirements-native.txt
          python -m build --wheel
          python -m pip install --no-deps dist/*.whl
          python -m pip check
      - name: Verify exact runtime pins
        run: |
          python - <<'PY'
          import platform
          import sys
          import tensorflow as tf

          assert sys.implementation.name == "cpython"
          assert sys.version_info[:2] == (3, 11)
          assert tf.__version__ == "2.21.0"
          assert platform.system() in {"Darwin", "Linux"}
          PY
      - name: Run real-Cargo native route and lifetime E2E
        env:
          REXTIO_TF_REQUIRE_INSTALLED_WHEEL: "1"
        run: python -m pytest -o pythonpath= tests/e2e/test_alpha_real_cargo.py -q

  package:
    name: package / wheel and sdist
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up CPython 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ci/requirements-package.txt
      - name: Install pinned package tools
        run: |
          python -m pip install --upgrade pip==26.1
          python -m pip install -r ci/requirements-package.txt
      - name: Build and inspect distributions
        run: |
          python -m build
          python ci/check_sdist_contract.py dist/*.tar.gz
          python -m twine check dist/*
          check-wheel-contents dist/*.whl
      - name: Fresh-install wheel with exact runtime dependency
        run: |
          python -m venv "$RUNNER_TEMP/package-smoke"
          "$RUNNER_TEMP/package-smoke/bin/python" -m pip install --upgrade pip==26.1
          "$RUNNER_TEMP/package-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/package-smoke/bin/python" -m pip check
          "$RUNNER_TEMP/package-smoke/bin/python" - <<'PY'
          import importlib.metadata
          import sys

          assert importlib.metadata.version("rextio-tensorflow") == "0.1.0"
          requirements = importlib.metadata.requires("rextio-tensorflow") or []
          assert "tensorflow==2.21.0" in requirements
          assert not any(name == "tensorflow" or name.startswith("tensorflow.") for name in sys.modules)
          from rextio_tensorflow.plugin import plugin

          assert plugin().plugin_id == "rextio-tensorflow"
          assert not any(name == "tensorflow" or name.startswith("tensorflow.") for name in sys.modules)
          PY

  ci-gate:
    name: ci-gate
    if: ${{ always() }}
    needs:
      - quality
      - platform-contract
      - native-e2e
      - package
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every public Alpha gate
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          PLATFORM_RESULT: ${{ needs.platform-contract.result }}
          NATIVE_RESULT: ${{ needs.native-e2e.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
        run: |
          python - <<'PY'
          import os

          results = {
              "quality": os.environ["QUALITY_RESULT"],
              "platform-contract": os.environ["PLATFORM_RESULT"],
              "native-e2e": os.environ["NATIVE_RESULT"],
              "package": os.environ["PACKAGE_RESULT"],
          }
          failures = {name: result for name, result in results.items() if result != "success"}
          assert not failures, f"public Alpha CI gates did not succeed: {failures}"
          PY
